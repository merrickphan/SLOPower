<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SLO Power — Car Detailing</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #0d1626;
    --dark-blue: #132240;
    --mid-blue: #1a3360;
    --accent-blue: #2a6bc4;
    --bright-blue: #4a9de8;
    --sky-blue: #7fc0f5;
    --silver: #c8d8ec;
    --silver-light: #e0ecf8;
    --silver-bright: #f0f6ff;
    --white: #ffffff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--black);
    color: var(--silver-light);
    font-family: 'Exo 2', sans-serif;
    overflow-x: hidden;
  }

  nav {
    position: fixed; top: 0; width: 100%; z-index: 100;
    background: rgba(13,22,38,0.88);
    backdrop-filter: blur(14px);
    border-bottom: 1px solid rgba(74,157,232,0.35);
    padding: 14px 40px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .nav-logo { display: flex; align-items: center; gap: 14px; }
  .nav-logo img { height: 54px; width: 54px; object-fit: contain; filter: drop-shadow(0 0 8px rgba(74,157,232,0.6)); }
  .nav-brand {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.7rem; letter-spacing: 4px;
    color: var(--sky-blue);
    text-shadow: 0 0 20px rgba(74,157,232,0.7);
  }
  .nav-links { display: flex; gap: 32px; list-style: none; }
  .nav-links a {
    font-family: 'Rajdhani', sans-serif; font-weight: 600;
    font-size: 0.95rem; letter-spacing: 2px; text-transform: uppercase;
    color: var(--silver-light); text-decoration: none; transition: color .2s;
  }
  .nav-links a:hover { color: var(--sky-blue); }

  .hero {
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; padding: 120px 20px 60px; position: relative;
    background:
      radial-gradient(ellipse 80% 55% at 50% 30%, rgba(42,107,196,0.45) 0%, transparent 70%),
      radial-gradient(ellipse 50% 40% at 50% 85%, rgba(26,51,96,0.5) 0%, transparent 60%),
      var(--black);
  }
  .hero::before {
    content: ''; position: absolute; inset: 0;
    background:
      repeating-linear-gradient(0deg, transparent, transparent 60px, rgba(74,157,232,0.04) 60px, rgba(74,157,232,0.04) 61px),
      repeating-linear-gradient(90deg, transparent, transparent 60px, rgba(74,157,232,0.04) 60px, rgba(74,157,232,0.04) 61px);
  }
  .hero-logo {
    width: min(300px, 68vw); margin-bottom: 28px;
    filter: drop-shadow(0 0 36px rgba(74,157,232,0.8));
    animation: float 4s ease-in-out infinite;
  }
  @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
  .hero h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(3.5rem, 9vw, 7rem); letter-spacing: 8px; line-height: 1;
    color: var(--white);
    text-shadow: 0 0 40px rgba(74,157,232,0.8), 0 0 80px rgba(74,157,232,0.3);
    margin-bottom: 10px;
  }
  .hero h1 span { color: var(--sky-blue); }
  .hero-tagline {
    font-family: 'Rajdhani', sans-serif; font-size: clamp(1rem, 2.5vw, 1.3rem);
    letter-spacing: 5px; text-transform: uppercase; color: var(--silver-light); margin-bottom: 14px;
  }
  .hero-sub {
    font-size: 0.85rem; color: var(--sky-blue); letter-spacing: 4px; text-transform: uppercase;
    margin-bottom: 40px; font-family: 'Rajdhani', sans-serif; font-weight: 600;
  }
  .hero-cta {
    display: inline-block; padding: 14px 46px;
    background: linear-gradient(135deg, var(--accent-blue), var(--bright-blue));
    color: #fff; font-family: 'Rajdhani', sans-serif; font-weight: 700;
    font-size: 1rem; letter-spacing: 3px; text-transform: uppercase;
    text-decoration: none; border-radius: 3px;
    box-shadow: 0 0 28px rgba(74,157,232,0.55); transition: box-shadow .3s, transform .2s;
  }
